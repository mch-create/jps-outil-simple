<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>JPS Reprise Personnel</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body { font-family: Arial; background:#f8fafc; padding:20px; }
    .box { background:white; padding:20px; border-radius:12px; }
    table { width:100%; border-collapse:collapse; margin-top:10px; }
    th, td { border:1px solid #ddd; padding:8px; }
    th { background:#f1f5f9; }
    input { width:100%; }
    .blue{color:#2563eb;font-weight:bold;}
    .green{color:#16a34a;font-weight:bold;}
    .red{color:#dc2626;font-weight:bold;}
  </style>
</head>

<body>
<div class="box">
  <h2>JPS Reprise Personnel</h2>

  <input type="file" accept=".xlsx,.xls" onchange="handleImport(event)">
  <button onclick="addRow()">Ajouter ligne</button>

  <table>
    <thead>
      <tr>
        <th>Nom</th>
        <th>Fonction</th>
        <th>Coef</th>
        <th>Heures</th>
        <th>Brut H</th>
        <th>Brut Mensuel</th>
        <th>% Prime</th>
        <th>Prime €</th>
        <th>Brut Total</th>
        <th>Coût Chargé</th>
        <th>Revient H</th>
        <th>Vente H</th>
        <th>Marge H</th>
        <th>Marge Mensuelle</th>
        <th>X</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const rows = [];

function toNumber(v){
  return Number(String(v).replace(",", ".")) || 0;
}

function eur(v){
  return new Intl.NumberFormat("fr-FR",{style:"currency",currency:"EUR"}).format(v||0);
}

function getPrimePctByCoef(c){
  c=Number(c);
  if(c==150||c==170)return 8;
  return 5;
}

function addRow(){
  rows.push({nom:"",fonction:"ADS",coef:"130",heures:"151.67",brutH:"",venteH:""});
  render();
}

function removeRow(i){
  rows.splice(i,1);
  render();
}

function updateRow(i,key,val){
  rows[i][key]=val;
  render();
}

function render(){
  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";

  rows.forEach((r,i)=>{
    let h=toNumber(r.heures);
    let bh=toNumber(r.brutH);
    let bm=bh*h;

    let pct=getPrimePctByCoef(r.coef);
    let prime=bm*pct/100;

    let total=bm+prime;
    let charge=total*1.4;
    let revientH=h?charge/h:0;

    let vente=toNumber(r.venteH);
    let margeH=vente?vente-revientH:0;
    let margeM=margeH*h;

    const tr=document.createElement("tr");

    tr.innerHTML=`
<td><input value="${r.nom}" oninput="updateRow(${i},'nom',this.value)"></td>
<td><input value="${r.fonction}" oninput="updateRow(${i},'fonction',this.value)"></td>
<td><input value="${r.coef}" oninput="updateRow(${i},'coef',this.value)"></td>
<td><input value="${r.heures}" oninput="updateRow(${i},'heures',this.value)"></td>
<td><input value="${r.brutH}" oninput="updateRow(${i},'brutH',this.value)"></td>
<td class="blue">${eur(bm)}</td>
<td class="blue">${pct}%</td>
<td class="blue">${eur(prime)}</td>
<td class="blue">${eur(total)}</td>
<td class="blue">${eur(charge)}</td>
<td class="blue">${eur(revientH)}</td>
<td><input value="${r.venteH}" oninput="updateRow(${i},'venteH',this.value)"></td>
<td class="${margeH<0?'red':'green'}">${vente?eur(margeH):'-'}</td>
<td class="${margeM<0?'red':'green'}">${vente?eur(margeM):'-'}</td>
<td><button onclick="removeRow(${i})">X</button></td>
`;
    tbody.appendChild(tr);
  });
}

function normalize(k){
  return String(k).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function getVal(obj,keys){
  for(let k in obj){
    for(let kk of keys){
      if(normalize(k)==normalize(kk)) return obj[k];
    }
  }
  return "";
}

async function handleImport(e){
  try{
    const file=e.target.files[0];
    const data=await file.arrayBuffer();
    const wb=XLSX.read(data,{type:"array"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const json=XLSX.utils.sheet_to_json(ws);

    rows.length=0;

    json.forEach(l=>{
      let heures=getVal(l,["Durée mensuelle","Base Mensuelle"])||151.67;
      let brutH=getVal(l,["Taux horaire","Rémunération"]);
      let brutM=getVal(l,["Salaire de base"]);

      if(!brutH && brutM){
        brutH=(brutM/heures).toFixed(2);
      }

      rows.push({
        nom:getVal(l,["Nom","Agent"]),
        fonction:getVal(l,["Fonction","Emploi"])||"ADS",
        coef:getVal(l,["Coefficient","Coef"])||130,
        heures:String(heures).replace(",","."),
        brutH:String(brutH).replace(",","."),
        venteH:""
      });
    });

    render();
    alert("Import OK : "+rows.length+" lignes");

  }catch(err){
    alert("Erreur import");
    console.error(err);
  }
}

addRow();
</script>
</body>
</html>
